apiVersion: automation.cloudbees.io/v1alpha1
kind: action
name: unify-commit
description: "'git commit' staged changes, using the GitHub API. This results in a signed/verified commit (which a plain 'git commit' using the GitHub App token would not produce)"
inputs:
  scm-token:
    description: "The SCM authentication token."
    required: false
    default: ${{ cloudbees.scm.token }}
  commit-message:
    description: "The commit message."
    required: true

runs:
  using: composite
  steps:
    - id: gh-api-commit
      name: Commit staged changes using the GitHub API (verified commit).
      uses: docker://alpine:3.24@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
      shell: sh
      env:
        GH_TOKEN: ${{ inputs.scm-token }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
      run: |
        apk add --no-cache bash jq curl git

        cat > /tmp/commit.sh << 'BASH_EOF'
        set -euo pipefail

        # GitHub REST API base + auth headers, reused by every call below.
        API="https://api.github.com"
        AUTH="Authorization: Bearer $GH_TOKEN"
        ACCEPT="Accept: application/vnd.github+json"

        if [ -z "$COMMIT_MESSAGE" ]; then
            echo "Error: Commit message is required (input: commit-message)"
            exit 1
        fi

        REMOTE_URL=$(git config --get remote.origin.url)
        if [ -z "$REMOTE_URL" ]; then
            echo "Error: No remote 'origin' configured"
            exit 1
        fi

        if [[ "$REMOTE_URL" =~ github\.com[:/]([^/]+)/([^/]+)(\.git)?$ ]]; then
            OWNER="${BASH_REMATCH[1]}"
            REPO_NAME="${BASH_REMATCH[2]%.git}"
            REPO="$OWNER/$REPO_NAME"
        else
            echo "Error: Could not parse GitHub repository from remote URL: $REMOTE_URL"
            exit 1
        fi

        CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
        BASE_COMMIT=$(git rev-parse HEAD)

        if git diff --cached --quiet; then
            echo "Error: No changes staged for commit. Use 'git add' first."
            exit 1
        fi

        echo "Creating commit via GitHub API..."
        echo "Repository: $REPO"
        echo "Branch: $CURRENT_BRANCH"
        echo "Base commit: ${BASE_COMMIT:0:8}"

        BASE_TREE=$(curl --fail-with-body --silent --show-error \
            --header "$AUTH" --header "$ACCEPT" \
            "$API/repos/$REPO/git/commits/$BASE_COMMIT" | jq -r '.tree.sha')
        TREE_ENTRIES="[]"

        while IFS=$'\t' read -r STATUS OLD_FILE NEW_FILE; do
            case "$STATUS" in
                D*)
                    FILE="$OLD_FILE"
                    ;;
                R*|C*)
                    FILE="$NEW_FILE"
                    ;;
                *)
                    FILE="$OLD_FILE"
                    ;;
            esac

            if [[ "$STATUS" == D* ]]; then
                TREE_ENTRIES=$(echo "$TREE_ENTRIES" | jq --arg path "$FILE" \
                    '. += [{"path": $path, "mode": "100644", "type": "blob", "sha": null}]')
            else
                if [[ "$STATUS" == R* ]]; then
                    TREE_ENTRIES=$(echo "$TREE_ENTRIES" | jq --arg path "$OLD_FILE" \
                        '. += [{"path": $path, "mode": "100644", "type": "blob", "sha": null}]')
                fi

                STAGED_CONTENT_BASE64=$(git show ":$FILE" | base64 | tr -d '\n')
                BLOB_REQUEST=$(jq -cn \
                    --arg content "$STAGED_CONTENT_BASE64" \
                    '{content: $content, encoding: "base64"}')
                BLOB_SHA=$(printf '%s' "$BLOB_REQUEST" | curl --fail-with-body --silent --show-error \
                    -X POST --header "$AUTH" --header "$ACCEPT" \
                    --data @- \
                    "$API/repos/$REPO/git/blobs" | jq -r '.sha')

                MODE=$(git ls-files -s "$FILE" | awk '{print $1}')
                if [ -z "$MODE" ]; then
                    if [ -x "$FILE" ]; then
                        MODE="100755"
                    else
                        MODE="100644"
                    fi
                fi

                TREE_ENTRIES=$(echo "$TREE_ENTRIES" | jq \
                    --arg path "$FILE" \
                    --arg sha "$BLOB_SHA" \
                    --arg mode "$MODE" \
                    '. += [{"path": $path, "mode": $mode, "type": "blob", "sha": $sha}]')
            fi
        done < <(git diff --cached --name-status)

        TREE_PAYLOAD=$(jq -n \
            --arg base_tree "$BASE_TREE" \
            --argjson tree "$TREE_ENTRIES" \
            '{base_tree: $base_tree, tree: $tree}')

        if ! TREE_RESPONSE=$(curl --fail-with-body --silent --show-error \
                -X POST --header "$AUTH" --header "$ACCEPT" \
                --data "$TREE_PAYLOAD" \
                "$API/repos/$REPO/git/trees" 2>&1); then
            echo "Error creating tree via API: $TREE_RESPONSE"
            exit 1
        fi

        NEW_TREE=$(echo "$TREE_RESPONSE" | jq -r '.sha')

        COMMIT_PAYLOAD=$(jq -n \
            --arg message "$COMMIT_MESSAGE" \
            --arg tree "$NEW_TREE" \
            --arg parent "$BASE_COMMIT" \
            '{message: $message, tree: $tree, parents: [$parent]}')

        if ! COMMIT_RESPONSE=$(curl --fail-with-body --silent --show-error \
                -X POST --header "$AUTH" --header "$ACCEPT" \
                --data "$COMMIT_PAYLOAD" \
                "$API/repos/$REPO/git/commits" 2>&1); then
            echo "Error creating commit via API: $COMMIT_RESPONSE"
            exit 1
        fi

        NEW_COMMIT=$(echo "$COMMIT_RESPONSE" | jq -r '.sha')

        REF_STATUS=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --header "$AUTH" --header "$ACCEPT" \
            "$API/repos/$REPO/git/refs/heads/$CURRENT_BRANCH")

        if [ "$REF_STATUS" = "200" ]; then
            PATCH_PAYLOAD=$(jq -n --arg sha "$NEW_COMMIT" '{sha: $sha}')
            curl --fail-with-body --silent --show-error \
                -X PATCH --header "$AUTH" --header "$ACCEPT" \
                --data "$PATCH_PAYLOAD" \
                "$API/repos/$REPO/git/refs/heads/$CURRENT_BRANCH" > /dev/null
        else
            CREATE_PAYLOAD=$(jq -n \
                --arg ref "refs/heads/$CURRENT_BRANCH" \
                --arg sha "$NEW_COMMIT" \
                '{ref: $ref, sha: $sha}')
            curl --fail-with-body --silent --show-error \
                -X POST --header "$AUTH" --header "$ACCEPT" \
                --data "$CREATE_PAYLOAD" \
                "$API/repos/$REPO/git/refs" > /dev/null
        fi

        git fetch origin "$CURRENT_BRANCH"
        git update-ref "refs/heads/$CURRENT_BRANCH" "$NEW_COMMIT"
        git reset --mixed "$NEW_COMMIT"

        echo "Created verified commit: ${NEW_COMMIT:0:8}"
        echo "Message: $COMMIT_MESSAGE"
        echo "Updated remote branch: $CURRENT_BRANCH"
        BASH_EOF

        bash /tmp/commit.sh
