apiVersion: automation.cloudbees.io/v1alpha1
kind: action
name: get-bifrost-config
description: >
  Fetch the Bifrost gateway config (base URL and virtual key) for this run at
  runtime, authenticated by the workflow build token.
outputs:
  bifrost-base-url:
    description: "Bifrost gateway base URL."
    value: ${{ steps.get-config.outputs.bifrost-base-url }}
  bifrost-vk:
    description: "Bifrost virtual key."
    value: ${{ steps.get-config.outputs.bifrost-vk }}

runs:
  using: composite
  steps:
    - id: get-config
      name: Get Bifrost config
      uses: docker://alpine:3.22.4
      shell: sh
      run: |
        set -eu
        apk add --no-cache -q curl jq
        RESPONSE=$(curl --fail --silent --show-error \
          --header "Authorization: Bearer ${{ cloudbees.api.token }}" \
          --header "Content-Type: application/json" \
          --data-raw '{}' \
          "${{ cloudbees.api.url }}/reserved/v1/organizations/${{ cloudbees.org.id }}/components/${{ cloudbees.component.id }}/flag-cleanup-secrets")

        BIFROST_BASE_URL=$(printf '%s' "$RESPONSE" | jq -r '.secrets["bifrost-base-url"] // error("bifrost-base-url missing in flag-cleanup-secrets response")')
        BIFROST_VK=$(printf '%s' "$RESPONSE" | jq -r '.secrets["bifrost-vk"] // error("bifrost-vk missing in flag-cleanup-secrets response")')

        # Mask the virtual key so it is redacted in step logs; masking
        # persists to subsequent steps that receive it.
        printf '%s' "$BIFROST_VK" | cloudbees mask

        printf '%s' "$BIFROST_BASE_URL" | tr -d '\n' > "$CLOUDBEES_OUTPUTS/bifrost-base-url"
        printf '%s' "$BIFROST_VK" | tr -d '\n' > "$CLOUDBEES_OUTPUTS/bifrost-vk"
